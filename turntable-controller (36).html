<title>Turntable</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --groove: #1f1f1f;
    --rim: #2a2a2a;
    --accent: #e8c97a;
    --accent2: #c45c3a;
    --text: #e8e4dc;
    --muted: #5a5850;
    --danger: #c45c3a;
    --success: #6db37a;
    --mono: 'DM Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* ── Scan lines overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.08) 2px,
      rgba(0,0,0,.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  h1 {
    font-family: var(--display);
    font-size: clamp(3rem, 10vw, 5.5rem);
    letter-spacing: .08em;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle {
    font-size: .65rem;
    letter-spacing: .3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: .4rem;
  }

  /* ── Main layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1.5rem;
    align-items: start;
    width: 100%;
    max-width: 920px;
  }

  /* ── Left controls ── */
  .controls-left {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── Right controls ── */
  .controls-right {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── Panel card ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 4px;
    padding: 1rem 1.2rem;
  }

  .panel-label {
    font-size: .58rem;
    letter-spacing: .25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: .7rem;
  }

  /* ── Status dot ── */
  .status-row {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-size: .75rem;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background .3s, box-shadow .3s;
  }

  .dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .dot.error     { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
  .dot.scanning  { animation: pulse 1s ease-in-out infinite; background: var(--accent); }

  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 4px var(--accent); }
    50%      { opacity: .4; box-shadow: none; }
  }

  /* ── BLE connect button ── */
  #connect-btn {
    width: 100%;
    margin-top: .8rem;
    padding: .55rem 1rem;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background .2s, color .2s;
  }

  #connect-btn:hover { background: var(--accent); color: var(--bg); }
  #connect-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── RPM display ── */
  .rpm-display {
    font-family: var(--display);
    font-size: 3.8rem;
    color: var(--accent);
    line-height: 1;
    letter-spacing: .05em;
  }

  .rpm-unit {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .2em;
    margin-top: .2rem;
  }

  /* ── Slider ── */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--rim);
    outline: none;
    margin: .8rem 0;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform .15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .slider-limits {
    display: flex;
    justify-content: space-between;
    font-size: .58rem;
    color: var(--muted);
    letter-spacing: .1em;
  }

  /* ── Direction toggle ── */
  .dir-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .dir-btn {
    padding: .5rem;
    border: 1px solid var(--rim);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .4rem;
  }

  .dir-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,201,122,.06);
  }

  .dir-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* ── Play/Stop button ── */
  #play-btn {
    width: 100%;
    padding: .8rem;
    border: 1px solid var(--rim);
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .7rem;
    transition: all .2s;
  }

  #play-btn.running {
    border-color: var(--danger);
    color: var(--danger);
  }

  #play-btn:hover { background: rgba(255,255,255,.04); }

  #play-btn .play-icon {
    width: 10px;
    height: 10px;
    border-left: 10px solid currentColor;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    display: inline-block;
    transition: all .2s;
  }

  #play-btn.running .play-icon {
    border-left: none;
    border-top: none;
    border-bottom: none;
    width: 10px;
    height: 10px;
    box-shadow: inset -4px 0 0 currentColor, inset 4px 0 0 currentColor;
    border-radius: 0;
  }

  /* ── Display platform ── */
  /* ── Centre: display platform ── */
  .disc-wrap {
    align-self: center;
    width: clamp(220px, 36vw, 300px);
  }

  .platform-scene {
    width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Horse canvas — explicit height required, canvas ignores aspect-ratio */
  #horse3d-canvas {
    display: block;
    width: 100%;
    height: clamp(240px, 39vw, 330px);
    filter: drop-shadow(0 0 16px rgba(255,100,0,.7)) drop-shadow(0 0 6px rgba(255,40,0,.5));
  }

  /* Static base — below the horse */
  .platform-base {
    display: block;
    width: 80%;
    height: auto;
    margin-top: -8%;
  }

  /* ── Log ── */
  .log {
    width: 100%;
    max-width: 860px;
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 4px;
    padding: .8rem 1rem;
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .05em;
    height: 72px;
    overflow-y: auto;
    line-height: 1.7;
  }

  .log-line { display: block; }
  .log-line.ok  { color: var(--success); }
  .log-line.err { color: var(--danger); }
  .log-line.info { color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
    }
    .disc-wrap { margin: 0 auto; }
    .controls-left, .controls-right { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Display Platform</h1>
  <p class="subtitle">BLE Controller &nbsp;·&nbsp; ESP32-C3</p>
</header>

<div class="layout">

  <!-- LEFT -->
  <div class="controls-left">

    <div class="panel">
      <div class="panel-label">Connection</div>
      <div class="status-row">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Disconnected</span>
      </div>
      <button id="connect-btn">Connect via BLE</button>
    </div>

    <div class="panel">
      <div class="panel-label">Speed</div>
      <div class="rpm-display" id="rpm-display">0.00</div>
      <div class="rpm-unit">Revolutions per minute</div>
      <input type="range" id="rpm-slider" min="0" max="14.65" step="0.05" value="0">
      <div class="slider-limits"><span>0</span><span>14.65 RPM</span></div>
    </div>

  </div>

  <!-- CENTRE: display platform -->
  <div class="disc-wrap">
    <div class="platform-scene">

      <!-- 3D horse (WebGL STL) -->
      <canvas id="horse3d-canvas" width="300" height="330"></canvas>

      <!-- Static base below horse -->
      <svg class="platform-base" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="74" rx="88" ry="10" fill="#000" opacity=".4"/>
        <rect x="30" y="32" width="140" height="42" rx="6" fill="#1c1c1c" stroke="#2e2e2e" stroke-width="1"/>
        <ellipse cx="100" cy="32" rx="70" ry="9" fill="#252525" stroke="#383838" stroke-width="1"/>
        <ellipse cx="100" cy="32" rx="60" ry="7" fill="#2a2a2a"/>
        <rect x="88" y="4" width="24" height="30" rx="3" fill="#1e1e1e" stroke="#333" stroke-width=".8"/>
        <ellipse cx="100" cy="4" rx="12" ry="3.5" fill="#2c2c2c" stroke="#3a3a3a" stroke-width=".8"/>
      </svg>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="controls-right">

    <div class="panel">
      <div class="panel-label">Direction</div>
      <div class="dir-toggle">
        <button class="dir-btn active" id="btn-cw">
          ↻ CW
        </button>
        <button class="dir-btn" id="btn-ccw">
          ↺ CCW
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Transport</div>
      <button id="play-btn">
        <span class="play-icon"></span>
        <span id="play-label">Play</span>
      </button>

  // Decode base64 → ArrayBuffer
  function b64ToBuffer(b64) {
    const bin = atob(b64);

    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);

    const positions = new Float32Array(nTris * 9);
    const normals   = new Float32Array(nTris * 9);

    for (let t = 0; t < nTris; t++) {

      const ny = view.getFloat32(off + 4, true);
      const nz = view.getFloat32(off + 8, true);
      off += 12;

        positions[pi++] = view.getFloat32(off + 4, true);
        positions[pi++] = view.getFloat32(off + 8, true);
        normals[ni++] = nx; normals[ni++] = ny; normals[ni++] = nz;
        off += 12;
      }
      off += 2; // attribute byte count

    return { positions, normals };

  const VS = [

    'attribute vec3 aNorm;',
    'uniform mat4 uMVP;',

    if (typeof running !== 'undefined' && running && typeof rpm !== 'undefined' && rpm > 0) {
      const rps = rpm / 60;
      angle += (clockwise ? 1 : -1) * rps * 2 * Math.PI * dt;
    }

    gl.viewport(0, 0, 300, 330);
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    const aspect = 300 / 330;
    const proj  = mat4Persp(0.85, aspect, 0.1, 100);
    const rotY  = mat4RotY(angle);
    const rotX  = mat4RotX(-0.25);
    const trans = mat4Trans(0, 0, -3.2);
    // Column-major order: apply rotY first, then rotX, then translate, then project
    const standUp = mat4RotX(-Math.PI / 2);  // rotate horse upright
    const mvp   = mat4Mul(proj, mat4Mul(trans, mat4Mul(rotX, mat4Mul(rotY, standUp))));

    gl.uniformMatrix4fv(uMVP, false, mvp);

    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

    gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
    gl.enableVertexAttribArray(aNorm);
    gl.vertexAttribPointer(aNorm, 3, gl.FLOAT, false, 0, 0);

    gl.drawArrays(gl.TRIANGLES, 0, nVerts);
  }
  requestAnimationFrame(render);
})();

// ── BLE UUIDs (match BLE.cpp) ─────────────────────────────────────────────────
const SERVICE_UUID = '1dfc550c-002f-4b0b-8944-0e50562fa31c';
const CHAR_UUID    = '54f0f267-ecd9-4a09-87ed-a385f9e8d27f';
const CHAR_OSC_UUID = '54f0f267-ecd9-4a09-87ed-a385f9e8d280';

// ── RPM conversion (28BYJ-48, half-step = 4096 steps/rev) ────────────────────
// step_delay_us = 1024000 / |param|  →  steps/sec = param  →  RPM = param×60/4096
const STEPS_PER_REV = 4096;
function paramToRpm(p)   { return Math.abs(p) * 60 / STEPS_PER_REV; }
function rpmToParam(rpm) { return Math.round(rpm * STEPS_PER_REV / 60); }
let device = null, server = null;
let pChar = null, pOscChar = null;
let connected = false;
let param = 0;
let rpm = 0.0, running = false, clockwise = true;
let lastRpm = 100.0;
let oscillating = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const dot        = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const connectBtn = document.getElementById('connect-btn');
const rpmSlider  = document.getElementById('rpm-slider');
const rpmDisplay = document.getElementById('rpm-display');

// horse3d-canvas is driven by its own rAF loop — no DOM ref needed
const playBtn    = document.getElementById('play-btn');
const playLabel  = document.getElementById('play-label');
const logEl      = document.getElementById('log');
const oscBtn   = document.getElementById('osc-btn');
const oscLabel = document.getElementById('osc-label');
const oscKnob  = document.getElementById('osc-knob');
const btnCW      = document.getElementById('btn-cw');
const btnCCW     = document.getElementById('btn-ccw');

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, type = '') {
  const span = document.createElement('span');
  span.className = `log-line ${type}`;
  const ts = new Date().toLocaleTimeString('en-GB', {hour12: false});
  span.textContent = `[ ${ts} ] ${msg}`;
  logEl.appendChild(span);
  logEl.appendChild(document.createElement('br'));
  logEl.scrollTop = logEl.scrollHeight;
}

// ── UI sync ───────────────────────────────────────────────────────────────────
function setConnected(state) {
  connected = state;
  dot.className = 'dot ' + (state ? 'connected' : 'error');
  statusText.textContent = state ? (device?.name || 'Turntable') : 'Disconnected';
  connectBtn.textContent = state ? 'Disconnect' : 'Connect via BLE';
}

function updateDiscAnimation() {
  // 3D horse rAF loop reads running/rpm/clockwise directly — nothing to do here
}

function updateRpmDisplay(rpmVal) {
  rpmDisplay.textContent = rpmVal.toFixed(2);
  rpmSlider.value = rpmVal.toFixed(2);
}

function updatePlayBtn() {
  if (running) {
    playBtn.classList.add('running');
    playLabel.textContent = 'Stop';
  } else {
    playBtn.classList.remove('running');
    playLabel.textContent = 'Play';
  }
}

function updateDirBtns() {
  btnCW.classList.toggle('active', clockwise);
  btnCCW.classList.toggle('active', !clockwise);
}

// ── BLE helpers ───────────────────────────────────────────────────────────────
// Firmware encodes everything as a signed integer string e.g. "500", "-200", "0"
function paramFromState() {
  if (!running) return 0;
  const p = rpmToParam(rpm);
  return clockwise ? p : -p;
}

async function writeParam(value) {
  if (!pChar) return;
  try {
    const encoder = new TextEncoder();
    await pChar.writeValue(encoder.encode(String(value)));
    log(`Sent param: ${value}`, 'info');
  } catch(e) { log('Write failed: ' + e.message, 'err'); }
}

async function writeOscillate(value) {
  if (!pOscChar) return;
  try {
    const encoder = new TextEncoder();
    await pOscChar.writeValue(encoder.encode(value ? '1' : '0'));
  } catch(e) { log('Write oscillate failed: ' + e.message, 'err'); }
}

function onOscNotify(event) {
  const text = new TextDecoder().decode(event.target.value);
  oscillating = text.trim() !== '0';
  updateOscBtn();
}

// Parse firmware value → update local display state
function applyParam(value) {
  param     = value;
  running   = value !== 0;
  if (value != 0) clockwise = value > 0;
  rpm       = paramToRpm(value);
  if (rpm > 0) lastRpm = rpm;
}

// Notification handler — firmware sends updated myParameter as a string
function onNotify(event) {
  const text = new TextDecoder().decode(event.target.value);
  const v = parseInt(text, 10);
  if (!isNaN(v)) {
    applyParam(v);
    updateAll();
    log(`Notify: param=${v} → ${rpm.toFixed(1)} RPM ${clockwise ? 'CW' : 'CCW'} ${running ? '' : '(stopped)'}`, 'ok');
  }
}

// ── Connect / disconnect ──────────────────────────────────────────────────────
async function connect() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth not supported. Use Chrome/Edge on desktop or Android.', 'err');
    return;
  }

  if (connected) {
    device?.gatt?.disconnect();
    setConnected(false);
    log('Disconnected.', 'info');
    return;
  }

  try {
    dot.className = 'dot scanning';
    statusText.textContent = 'Scanning…';
    connectBtn.disabled = true;

    // First time — scan and pair
    if (!device) {
      log('Scanning for Turntable…', 'info');
      device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
      });
      device.addEventListener('gattserverdisconnected', () => {
        setConnected(false);
        pChar = null;
        pOscChar = null;
        server = null;
        log('Device disconnected. Press Connect to reconnect.', 'err');
        updateAll();
      });
    } else {
      log(`Reconnecting to "${device.name}"…`, 'info');
    }

    // Always get a fresh GATT server reference
    server = await device.gatt.connect();
    log('GATT connected, getting service…', 'info');

    const service = await server.getPrimaryService(SERVICE_UUID);

    pChar = await service.getCharacteristic(CHAR_UUID);
    pChar.removeEventListener('characteristicvaluechanged', onNotify);
    await pChar.startNotifications();
    pChar.addEventListener('characteristicvaluechanged', onNotify);

    pOscChar = await service.getCharacteristic(CHAR_OSC_UUID);
    pOscChar.removeEventListener('characteristicvaluechanged', onOscNotify);
    await pOscChar.startNotifications();
    pOscChar.addEventListener('characteristicvaluechanged', onOscNotify);

    const dataView = await pChar.readValue();
    const text = new TextDecoder().decode(dataView);
    const v = parseInt(text, 10);
    if (!isNaN(v)) applyParam(v);

    const oscView = await pOscChar.readValue();
    oscillating = new TextDecoder().decode(oscView).trim() !== '0';

    updateAll();
    setConnected(true);
    log(`Connected to "${device.name}". param=${param} → ${rpm.toFixed(1)} RPM ${clockwise ? 'CW' : 'CCW'} osc=${oscillating}`, 'ok');

  } catch(e) {
    dot.className = 'dot error';
    statusText.textContent = 'Error';
    // If reconnect failed, clear device so next attempt does a fresh scan
    if (device && !device.gatt.connected) {
      log('Reconnect failed — will re-scan on next attempt.', 'err');
      device = null;
      pChar = null;
      server = null;
    }
    log('Connection failed: ' + e.message, 'err');
  } finally {
    connectBtn.disabled = false;
  }
}

// ── UI update helper ──────────────────────────────────────────────────────────
function updateAll() {
  updateRpmDisplay(rpm);
  updatePlayBtn();
  updateDirBtns();
  updateDiscAnimation();
  updateOscBtn();
}

// ── Controls ──────────────────────────────────────────────────────────────────
rpmSlider.addEventListener('input', async () => {
  rpm = parseFloat(rpmSlider.value);
  updateRpmDisplay(rpm);
  updateDiscAnimation();
  await writeParam(paramFromState());
});

playBtn.addEventListener('click', async () => {
  running = !running;
  if (running && rpm === 0) rpm = lastRpm;
  updatePlayBtn();
  updateDiscAnimation();
  await writeParam(paramFromState());
  log(`${running ? 'START' : 'STOP'} command sent`, 'info');
});

btnCW.addEventListener('click', async () => {
  clockwise = true;
  updateDirBtns();
  await writeParam(paramFromState());
  log('Direction → CW', 'info');
});

btnCCW.addEventListener('click', async () => {
  clockwise = false;
  updateDirBtns();
  await writeParam(paramFromState());
  log('Direction → CCW', 'info');
});

function updateOscBtn() {
  if (oscillating) {
    oscBtn.style.borderColor = 'var(--accent)';
    oscBtn.style.color = 'var(--accent)';
    oscKnob.style.left = '8px';
  } else {
    oscBtn.style.borderColor = 'var(--rim)';
    oscBtn.style.color = 'var(--muted)';
    oscKnob.style.left = '2px';
  }
}

oscBtn.addEventListener('click', async () => {
  oscillating = !oscillating;
  updateOscBtn();
  await writeOscillate(oscillating);
  if (oscillating) {
    running = true;
    if (rpm === 0) rpm = lastRpm;
    updateAll();
    await writeParam(paramFromState()); // make sure motor is running
    log('Oscillate ON — one full turn CW then CCW, repeating', 'info');
  } else {
    log('Oscillate OFF', 'info');
  }
});

connectBtn.addEventListener('click', connect);

function setPresetRpm(rpmVal) {
  rpm = rpmVal;
  running = true;
  updateAll();
  writeParam(paramFromState());
  log(`Preset: ${rpmVal} RPM → param=${paramFromState()}`, 'info');
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateAll();
</script>
</body>
</html>
